<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流光 Glance 网页版</title>
    <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #0b0f19;
      --panel: rgba(22, 27, 34, 0.6);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f0f6fc;
      --muted: #8b949e;
      --accent: #00d2ff;
      --accent-hover: #3a86ff;
      --ok: #2ea043;
      --warn: #d29922;
      --danger: #f85149;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.6);
      --radius: 18px;
      --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "PingFang SC", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--font-family);
      background: var(--bg);
      line-height: 1.5;
    }

    #glanceCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1440px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 40px 0 80px;
    }

    .status-bar {
      position: sticky;
      top: 16px;
      z-index: 20;
      display: none;
      margin-bottom: 24px;
      padding: 14px 20px;
      border-radius: 12px;
      background: rgba(22, 27, 34, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      color: var(--text);
      box-shadow: var(--shadow-md);
      font-weight: 500;
      text-align: center;
    }

    .status-bar.show {
      display: block;
    }

    .status-bar.error {
      background: rgba(255, 59, 48, 0.1);
      border-color: rgba(255, 59, 48, 0.2);
      color: var(--danger);
    }

    .hero,
    .main-grid {
      display: grid;
      gap: 32px;
    }

    .hero {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
    }

    .main-grid {
      grid-template-columns: 1.5fr 1fr;
    }

    .stack {
      display: grid;
      gap: 32px;
    }

    .panel {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .content {
      padding: 32px;
    }

    .hero-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: linear-gradient(145deg, rgba(30, 35, 45, 0.8) 0%, rgba(15, 20, 30, 0.8) 100%);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .brand i {
      color: var(--accent);
      width: 18px;
      height: 18px;
    }

    h1, h2, h3, h4, p {
      margin: 0;
    }

    h1 {
      margin: 16px 0 12px;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    h3 {
      font-size: 18px;
      font-weight: 600;
    }

    .hero-card p,
    .muted {
      color: var(--muted);
      line-height: 1.6;
    }

    .icon-box {
      width: 80px;
      height: 80px;
      margin: 32px auto 24px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      color: var(--accent);
    }

    .icon-box i {
      width: 40px;
      height: 40px;
      stroke-width: 1.5;
    }

    .section-head,
    .toolbar,
    .task-head,
    .list-head,
    .task-actions,
    .quick-actions,
    .screenshot-actions,
    .meta-grid,
    .filter-grid,
    .form-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-head,
    .task-head,
    .list-head {
      align-items: center;
      justify-content: space-between;
    }

    .section-head {
      margin-bottom: 24px;
    }

    .section-head span,
    .hint {
      color: var(--muted);
      font-size: 14px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 24px;
    }

    .metric {
      padding: 20px;
      border-radius: 16px;
      background: var(--bg);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .metric strong {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text);
    }

    .metric span {
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    .input,
    .select,
    .textarea,
    .button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      padding: 12px 16px;
      font: inherit;
      font-size: 15px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
    }

    .textarea {
      min-height: 120px;
      resize: vertical;
    }

    .button {
      width: auto;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      font-weight: 500;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .button:hover {
      background: var(--accent-hover);
    }

    .button.secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .button.secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .button.warn {
      background: var(--warn);
      color: #fff;
    }

    .button.warn:hover {
      background: #e58e09;
    }

    .button.danger {
      background: var(--danger);
      color: #fff;
    }

    .button.danger:hover {
      background: #e5352b;
    }

    .button i {
      width: 18px;
      height: 18px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto auto;
      gap: 12px;
      margin-bottom: 24px;
      background: var(--bg);
      padding: 20px;
      border-radius: 16px;
      border: 1px solid var(--line);
    }

    .task-list,
    .list-column {
      display: grid;
      gap: 16px;
    }

    .card,
    .task-card,
    .list-card {
      padding: 20px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s;
    }

    .task-card:hover,
    .list-card:hover {
      box-shadow: var(--shadow-md);
    }

    .task-title {
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 8px;
      background: var(--bg);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--line);
    }

    .chip i {
      width: 14px;
      height: 14px;
    }

    .chip.high {
      background: rgba(255, 59, 48, 0.08);
      color: var(--danger);
      border-color: rgba(255, 59, 48, 0.2);
    }

    .chip.done {
      background: rgba(52, 199, 89, 0.08);
      color: var(--ok);
      border-color: rgba(52, 199, 89, 0.2);
    }

    .chip.warn {
      background: rgba(255, 159, 10, 0.08);
      color: #d08200;
      border-color: rgba(255, 159, 10, 0.2);
    }

    .mini-btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .mini-btn i {
      width: 14px;
      height: 14px;
    }

    .mini-btn:hover {
      background: var(--bg);
      color: var(--text);
    }

    .mini-btn.ok:hover {
      color: var(--ok);
      border-color: var(--ok);
      background: rgba(52, 199, 89, 0.05);
    }

    .mini-btn.warn:hover {
      color: var(--warn);
      border-color: var(--warn);
      background: rgba(255, 159, 10, 0.05);
    }

    .mini-btn.danger:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: rgba(255, 59, 48, 0.05);
    }

    .quick-note-box,
    .screenshot-box {
      display: grid;
      gap: 16px;
    }

    .drop-zone {
      min-height: 220px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      border: 2px dashed var(--line);
      background: var(--bg);
      color: var(--muted);
      text-align: center;
      padding: 24px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .drop-zone:hover {
      border-color: var(--muted);
    }

    .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(0, 113, 227, 0.04);
      color: var(--accent);
    }

    .drop-zone-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .drop-zone-content i {
      width: 48px;
      height: 48px;
      stroke-width: 1;
      color: inherit;
    }

    .drop-zone img {
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      display: block;
      border-radius: 12px;
    }

    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      background: var(--bg);
      border: 1px dashed var(--line);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .empty i {
      width: 32px;
      height: 32px;
      opacity: 0.5;
    }

    .details-img {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 16px;
      border: 1px solid var(--line);
    }

    details {
      margin-top: 16px;
    }

    details summary {
      cursor: pointer;
      color: var(--accent);
      font-size: 14px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      user-select: none;
    }

    details summary::-webkit-details-marker {
      display: none;
    }

    .digest-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 12px;
    }

    .digest-item i {
      width: 16px;
      height: 16px;
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 4px;
    }

    @media (max-width: 1120px) {
      .hero,
      .main-grid {
        grid-template-columns: 1fr;
      }

      .meta-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .filter-grid,
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: 100%;
        padding: 24px 16px;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }
      
      .content {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <canvas id="glanceCanvas"></canvas>
  <div class="shell">
    <div class="status-bar" id="statusBar"></div>

    <section class="hero">
      <div class="panel content hero-card">
        <div>
          <div class="brand"><i data-lucide="aperture"></i>Glance Web</div>
          <h1>专注于效率与极简</h1>
          <p>这一版去除了冗余元素，采用了更为优雅、专注的布局设计。任务管理、搜索筛选、编辑、截图录入、快速记录、导入导出和日程摘要，一切井然有序。</p>
        </div>
        <div class="icon-box"><i data-lucide="sparkles"></i></div>
        <p class="muted">没有多余的干扰，只有纯粹的工作流。确保桌面与移动端都能提供一致、高级的专业体验。</p>
        <div style="margin-top: 32px;">
          <a href="/demo" class="button" style="text-decoration: none; font-size: 16px; padding: 14px 24px;"><i data-lucide="rocket"></i> 体验项目 Demo</a>
        </div>
      </div>

          </section>
  </div>

  <script>
    lucide.createIcons();
  </script>

  <!-- 流光粒子背景特效 -->
  <script>
    (function initParticles() {
      const canvas = document.getElementById('glanceCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];
      let mouse = { x: -1000, y: -1000 };

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        createParticles();
      }

      window.addEventListener('resize', resize);

      window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      window.addEventListener('mouseout', () => {
        mouse.x = -1000;
        mouse.y = -1000;
      });

      class Particle {
        constructor() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.size = Math.random() * 1.5 + 0.2; // 模拟星星大小
          this.speedX = (Math.random() - 0.5) * 0.3; // 更慢的漂浮速度，更像星空
          this.speedY = (Math.random() - 0.5) * 0.3;
          this.baseAlpha = Math.random() * 0.5 + 0.1;
        }

        update() {
          this.x += this.speedX;
          this.y += this.speedY;

          if (this.x > width) this.x = 0;
          else if (this.x < 0) this.x = width;
          if (this.y > height) this.y = 0;
          else if (this.y < 0) this.y = height;
        }

        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${this.baseAlpha})`; // 白色星星
          ctx.shadowBlur = 8;
          ctx.shadowColor = 'rgba(0, 210, 255, 0.8)';
          ctx.fill();
          ctx.shadowBlur = 0; // 重置阴影以免影响连线
        }
      }

      function createParticles() {
        particles = [];
        const num = Math.min(Math.floor((width * height) / 8000), 200); // 增加星星密度
        for (let i = 0; i < num; i++) {
          particles.push(new Particle());
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        
        for (let i = 0; i < particles.length; i++) {
          particles[i].update();
          particles[i].draw();
          
          // 鼠标交互：引力与高亮流光连线
          const dxMouse = particles[i].x - mouse.x;
          const dyMouse = particles[i].y - mouse.y;
          const distMouse = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);
          
          if (distMouse < 220) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(mouse.x, mouse.y);
            // 靠近鼠标的线更亮，呈流光青蓝色
            const alpha = 0.8 * (1 - distMouse / 220);
            ctx.strokeStyle = `rgba(0, 210, 255, ${alpha})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            // 吸引效果
            particles[i].x -= dxMouse * 0.02;
            particles[i].y -= dyMouse * 0.02;
          }
          
          // 星星之间的连线，形成星座/星网
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              // 星星连线呈现幽暗的蓝紫色，增加星空深邃感
              const lineAlpha = 0.3 * (1 - dist / 120);
              ctx.strokeStyle = `rgba(100, 150, 255, ${lineAlpha})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animate);
      }

      resize();
      animate();
    })();
  </script>
</body>
</html>
